<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETWA Members Area</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:Inter,sans-serif;background:#07111f;color:#fff}
.container{max-width:900px;margin:auto;padding:24px}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:20px;margin-bottom:16px}
button{padding:10px 14px;border:none;border-radius:10px;background:#7dd3fc;color:#000;font-weight:bold;cursor:pointer}
.project{border-bottom:1px solid rgba(255,255,255,0.1);padding:12px 0}
.vote-btn{margin-top:8px}
.admin{background:rgba(167,139,250,0.15)}
</style>
</head>
<body>
<div class="container">
<h1>ETWA Members Area</h1>
<p id="user"></p>
<button onclick="logout()">Logout</button>

<div class="card">
<h2>Future Projects (Voting)</h2>
<div id="projects"></div>
</div>

<div class="card admin" id="admin-panel" style="display:none">
<h2>Admin - Add Project</h2>
<input id="title" placeholder="Project title" style="width:100%;margin-bottom:8px;padding:10px;border-radius:8px;border:none" />
<textarea id="desc" placeholder="Description" style="width:100%;margin-bottom:8px;padding:10px;border-radius:8px;border:none"></textarea>
<button onclick="addProject()">Add Project</button>
</div>
</div>

<script>
const supabaseClient = supabase.createClient(
  'https://btlnftedaituncygbwcy.supabase.co',
  'sb_publishable_U2yl2e50jQK3-x2EGCGVEg_Zc_4KNfT'
);

let currentUser;

async function init(){
  const { data:{user} } = await supabaseClient.auth.getUser();
  if(!user) return window.location.href="/";
  currentUser = user;
  document.getElementById('user').innerText = "Logged as: " + user.email;

  // Admin panel is always visible, but backend enforces permissions
  document.getElementById('admin-panel').style.display = "block";

  loadProjects();
}

async function loadProjects(){
  const { data } = await supabaseClient.from('projects').select('*');
  const container = document.getElementById('projects');
  container.innerHTML = '';

  data.forEach(p => {
    const div = document.createElement('div');
    div.className = 'project';
    div.innerHTML = `
      <strong>${p.title}</strong>
      <p>${p.description}</p>
      <button class="vote-btn" onclick="vote(${p.id})">Vote</button>
    `;
    container.appendChild(div);
  });
}

// NOW CALLS BACKEND FUNCTION (SECURE)
async function vote(projectId){
  const { error } = await supabaseClient.rpc('vote_project', {
    project_id_input: projectId
  });

  if(error) return alert(error.message);
  loadProjects();
}

// ADMIN CREATION VIA BACKEND
async function addProject(){
  const title = document.getElementById('title').value;
  const description = document.getElementById('desc').value;

  const { error } = await supabaseClient.rpc('create_project', {
    title_input: title,
    description_input: description
  });

  if(error) return alert(error.message);
  loadProjects();
}

async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = "/";
}

init();
</script>
</body>
</html>
